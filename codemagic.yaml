workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      node: v22.15.0
      xcode: 16.3.0
    scripts:
      - name: Decode keys from base64
        script: |
          echo $APP_STORE_CONNECT_PRIVATE_KEY | base64 --decode > /tmp/api_key.p8
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/cert_key.pem
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.holsi.app" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @file:/tmp/api_key.p8 \
            --certificate-key @file:/tmp/cert_key.pem
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Install dependencies
        script: |
          rm -f package-lock.json
          npm install --include=optional
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            -scheme "App"
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            --scheme "App" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: "@file:/tmp/api_key.p8"
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
