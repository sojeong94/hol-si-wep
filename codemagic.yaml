workflows:
  android-google-play:
    name: Android Google Play Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      node: v22.15.0
      java: 21
    scripts:
      - name: Install dependencies
        script: |
          npm install --include=optional
      - name: Build web app
        script: npm run build
      - name: Add Capacitor Android platform
        script: npx cap add android
      - name: Sync Capacitor Android
        script: npx cap sync android
      - name: Set version code
        script: |
          BUILD_NUMBER=${BUILD_NUMBER:-1}
          sed -i '' "s/versionCode .*/versionCode $BUILD_NUMBER/" android/app/build.gradle
      - name: Build release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
      - name: Debug env vars
        script: |
          echo "CM_KEYSTORE length: ${#CM_KEYSTORE}"
          echo "CM_KEY_ALIAS: $CM_KEY_ALIAS"
          echo "CM_KEYSTORE_PASSWORD set: $([ -n "$CM_KEYSTORE_PASSWORD" ] && echo YES || echo NO)"
          echo "CM_KEY_PASSWORD set: $([ -n "$CM_KEY_PASSWORD" ] && echo YES || echo NO)"
      - name: Sign AAB
        script: |
          echo "$CM_KEYSTORE" | base64 -D > /tmp/holsi.keystore
          jarsigner \
            -keystore /tmp/holsi.keystore \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -keypass "$CM_KEY_PASSWORD" \
            -signedjar android/app/build/outputs/bundle/release/app-release-signed.aab \
            android/app/build/outputs/bundle/release/app-release.aab \
            "$CM_KEY_ALIAS"
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
      node: v22.15.0
      xcode: 16.3.0
    scripts:
      - name: Decode keys from base64
        script: |
          echo $APP_STORE_CONNECT_PRIVATE_KEY | base64 --decode > /tmp/api_key.p8
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/cert_key.pem
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.holsi.app" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @file:/tmp/api_key.p8 \
            --certificate-key @file:/tmp/cert_key.pem
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Install dependencies
        script: |
          rm -f package-lock.json
          npm install --include=optional
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Set build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all $BUILD_NUMBER
      - name: Resolve SPM packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            -scheme "App"
      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            --scheme "App" \
            --config Release
      - name: Upload to TestFlight
        script: |
          IPA=$(find "$CM_BUILD_DIR/build/ios/ipa" -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          app-store-connect publish \
            --path "$IPA" \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --private-key @file:/tmp/api_key.p8 \
            --testflight \
            --beta-build-localizations '[{"locale":"ko","whats_new":"초기 베타 버전"}]' \
            || true
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
